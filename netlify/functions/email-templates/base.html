<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{SUBJECT}}</title>
  <style>
    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      line-height: 1.7;
      color: #1A1A1A;
      background-color: #FFFFFF;
      margin: 0;
      padding: 0;
    }
    .email-container {
      max-width: 600px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    h1, h2, h3 {
      font-family: 'Georgia', 'Times New Roman', serif;
      font-weight: 500;
      line-height: 1.3;
      color: #000000;
      margin-top: 2rem;
      margin-bottom: 1rem;
    }
    h2 {
      font-size: 1.75rem;
      border-bottom: 1px solid #E5E5E5;
      padding-bottom: 0.5rem;
    }
    p {
      margin-bottom: 1.25rem;
      color: #333333;
    }
    em {
      font-style: italic;
      color: #666666;
    }
    strong {
      font-weight: 600;
      color: #000000;
    }
    ul, ol {
      margin-bottom: 1.5rem;
      padding-left: 1.5rem;
    }
    li {
      margin-bottom: 0.75rem;
      color: #333333;
    }
    a {
      color: #1A1A1A;
      text-decoration: underline;
    }
    a:hover {
      color: #666666;
    }
    .footer {
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid #E5E5E5;
      font-size: 0.875rem;
      color: #666666;
      text-align: center;
    }
    .footer a {
      color: #666666;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="email-container">
    {{BODY_CONTENT}}

    <div class="footer">
      <p><strong>Dr. Negin Rajaipour, MD</strong><br>
      Board-Certified Family Medicine · U.S. Navy Veteran<br>
      CEO, VitaRegen Medical™ · Developer, The E3 Method™</p>

      <p style="margin-top: 1.5rem;">{{PHYSICAL_ADDRESS}}</p>

      <p style="margin-top: 1.5rem;">
        <a href="{{UNSUBSCRIBE_LINK}}">Unsubscribe</a> from these emails
      </p>
    </div>
  </div>
</body>
</html>
